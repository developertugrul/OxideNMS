name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build Release
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: cisco.exe
            asset_name: cisco-windows-amd64.exe
            use_wix: true
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: cisco
            asset_name: cisco-linux-amd64
            use_deb: true
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: cisco
            asset_name: cisco-macos-amd64
            use_bundle: true

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev build-essential

      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }}
        
      - name: Package Windows (WiX MSI)
        if: matrix.use_wix
        run: |
          cargo install cargo-wix
          cargo wix init
          cargo wix -v --nocapture
          
      - name: Package Linux (.deb)
        if: matrix.use_deb
        run: |
          cargo install cargo-deb
          cargo deb --target ${{ matrix.target }}
          
      - name: Upload Binaries to Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            target/${{ matrix.target }}/release/${{ matrix.artifact_name }}
            target/wix/*.msi
            target/${{ matrix.target }}/debian/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
