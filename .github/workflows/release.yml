name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  verify:
    name: Verify
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Check formatting
        run: cargo fmt --check

      - name: Run tests
        run: cargo test --locked

      - name: Run clippy
        run: cargo clippy --locked -- -D warnings

  build:
    name: Build for ${{ matrix.os }}
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: OxideNMS-linux-amd64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: OxideNMS-windows-amd64.exe
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: OxideNMS-macos-arm64
          - os: macos-13
            target: x86_64-apple-darwin
            artifact_name: OxideNMS-macos-x86_64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: >
          sudo apt-get update &&
          sudo apt-get install -y
          libgtk-3-dev
          libasound2-dev
          libxkbcommon-dev
          libxkbcommon-x11-dev
          libxcb-render0-dev
          libxcb-shape0-dev
          libxcb-xfixes0-dev

      - name: Build release
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Prepare assets (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: mv target/${{ matrix.target }}/release/oxidenms ${{ matrix.artifact_name }}

      - name: Prepare assets (Windows)
        if: matrix.os == 'windows-latest'
        run: move target\${{ matrix.target }}\release\oxidenms.exe ${{ matrix.artifact_name }}

      - name: Upload binaries to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
