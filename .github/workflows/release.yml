name: Release

on:
  push:
    tags:
      - 'v*' # Sadece v1.0.0 gibi tag atıldığında çalışır

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: oxidenms-linux
            asset_name: oxidenms-linux-amd64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: oxidenms-windows.exe
            asset_name: oxidenms-windows-amd64.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: oxidenms-mac
            asset_name: oxidenms-macos-amd64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libasound2-dev

      - name: Build Release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare Assets (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: mv target/${{ matrix.target }}/release/oxidenms ${{ matrix.artifact_name }}

      - name: Prepare Assets (Windows)
        if: matrix.os == 'windows-latest'
        run: move target\${{ matrix.target }}\release\oxidenms.exe ${{ matrix.artifact_name }}

      - name: Upload binaries to Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ matrix.artifact_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
